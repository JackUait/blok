name: E2E Tests

on:
  workflow_call:
    inputs:
      artifact-name:
        description: 'Name of the build artifact to download'
        required: false
        default: 'dist'
        type: string

jobs:
  install-browsers:
    name: Install Browsers
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Node is pinned to 24.14.1 because `playwright install` (< 1.60.0) hangs forever
      # after the browser download on Node >= 24.16 (vendored-yauzl extract bug,
      # microsoft/playwright#40998). Remove the pin after bumping @playwright/test to >= 1.60.0.
      - name: Setup Node.js and Dependencies
        uses: ./.github/actions/setup-node-deps
        with:
          node-version: 24.14.1

      - name: Setup Playwright Browsers
        uses: ./.github/actions/setup-playwright-browsers
        with:
          browsers: chromium firefox webkit

  e2e-tests:
    name: E2E (${{ matrix.project }}${{ matrix.shard && format(' {0}', matrix.shard) || '' }})
    runs-on: ubuntu-latest
    needs: [install-browsers]
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: chromium
            browser: chromium
            shard: 1/2
          - project: chromium
            browser: chromium
            shard: 2/2
          - project: firefox
            browser: firefox
            shard: 1/2
          - project: firefox
            browser: firefox
            shard: 2/2
          - project: webkit
            browser: webkit
            shard: 1/2
          - project: webkit
            browser: webkit
            shard: 2/2
          # chromium-logic has ~2x more tests (566 vs 278), so use 3 shards
          - project: chromium-logic
            browser: chromium
            shard: 1/3
          - project: chromium-logic
            browser: chromium
            shard: 2/3
          - project: chromium-logic
            browser: chromium
            shard: 3/3
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js and Dependencies
        uses: ./.github/actions/setup-node-deps

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          # Archive keeps repo-relative paths (dist/, packages/*/dist/); extract at root
          # so the react-adapter fixture can load /packages/react/dist/index.mjs.
          path: .

      - name: Mark Build as Available
        run: echo "BLOK_BUILT=true" >> $GITHUB_ENV

      - name: Build React Vendor Files
        run: node scripts/build-react-vendor.mjs

      - name: Restore Playwright Browsers
        uses: ./.github/actions/setup-playwright-browsers
        with:
          browsers: ${{ matrix.browser }}
          download: 'false'

      - name: Run E2E Tests
        run: yarn playwright test --project=${{ matrix.project }} --shard=${{ matrix.shard }}

      - name: Upload E2E Test Results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results-${{ matrix.project }}-${{ strategy.job-index }}
          path: test-results/
          retention-days: 3

      - name: Upload Blob Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blob-report-${{ matrix.project }}-${{ strategy.job-index }}
          path: blob-report/
          retention-days: 1

  merge-reports:
    name: Merge E2E Reports
    if: ${{ !cancelled() && github.ref != 'refs/heads/master' }}
    needs: [e2e-tests]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js and Dependencies
        uses: ./.github/actions/setup-node-deps

      - name: Download all blob reports
        uses: actions/download-artifact@v4
        with:
          path: all-blob-reports
          pattern: blob-report-*
          merge-multiple: true

      - name: Merge into unified HTML report
        run: |
          if [ -d ./all-blob-reports ] && [ -n "$(ls -A ./all-blob-reports 2>/dev/null)" ]; then
            npx playwright merge-reports --reporter html ./all-blob-reports
          else
            echo "No blob reports found (e2e tests were skipped or cancelled); nothing to merge."
          fi

      - name: Upload unified HTML report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 14
