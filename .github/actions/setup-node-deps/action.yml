name: "Setup Node.js and Dependencies"
description: "Sets up Node.js and installs Yarn dependencies with caching"

inputs:
  node-version:
    description: "Node.js version to use"
    required: false
    default: "26.5.0"

outputs:
  cache-hit:
    description: "Whether the Yarn cache was hit"
    value: ${{ steps.setup-node.outputs.cache-hit }}

runs:
  using: "composite"
  steps:
    # Runs against the runner's pre-installed Node (before setup-node switches
    # versions), so the `yarn` shim it creates stays on PATH afterwards. Node 26
    # no longer bundles Corepack, so install it if the runner image ever stops
    # providing it — otherwise this whole action fails at its first step.
    - name: Enable Corepack
      shell: bash
      run: |
        corepack --version >/dev/null 2>&1 || npm install -g corepack@0.35.0
        corepack enable

    - name: Setup Node.js
      id: setup-node
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: "yarn"

    - name: Install dependencies
      shell: bash
      run: yarn install --immutable

    - name: Install docs dependencies
      shell: bash
      run: |
        if [ -f docs/package.json ]; then
          cd docs && yarn install --immutable
        fi
