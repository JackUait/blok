name: E2E Tests

on:
  workflow_call:
    inputs:
      artifact-name:
        description: 'Name of the build artifact to download'
        required: false
        default: 'dist'
        type: string

jobs:
  install-browsers:
    name: Install Browsers
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js and Dependencies
        uses: ./.github/actions/setup-node-deps

      - name: Get Playwright version
        id: pw
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> $GITHUB_OUTPUT

      - name: Cache Playwright Browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium firefox webkit --with-deps

  e2e-tests:
    name: E2E (${{ matrix.project }}${{ matrix.shard && format(' {0}', matrix.shard) || '' }})
    runs-on: ubuntu-latest
    needs: [install-browsers]
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: chromium
            browser: chromium
            shard: 1/2
          - project: chromium
            browser: chromium
            shard: 2/2
          - project: firefox
            browser: firefox
            shard: 1/2
          - project: firefox
            browser: firefox
            shard: 2/2
          - project: webkit
            browser: webkit
            shard: 1/2
          - project: webkit
            browser: webkit
            shard: 2/2
          # chromium-logic has ~2x more tests (566 vs 278), so use 3 shards
          - project: chromium-logic
            browser: chromium
            shard: 1/3
          - project: chromium-logic
            browser: chromium
            shard: 2/3
          - project: chromium-logic
            browser: chromium
            shard: 3/3
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js and Dependencies
        uses: ./.github/actions/setup-node-deps

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: dist/

      - name: Mark Build as Available
        run: echo "BLOK_BUILT=true" >> $GITHUB_ENV

      - name: Build React Vendor Files
        run: node scripts/build-react-vendor.mjs

      - name: Get Playwright version
        id: pw
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> $GITHUB_OUTPUT

      - name: Restore Playwright Browsers from Cache
        uses: actions/cache/restore@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}
          fail-on-cache-miss: true

      - name: Install Browser Dependencies
        run: npx playwright install-deps ${{ matrix.browser }}

      - name: Run E2E Tests
        run: yarn playwright test --project=${{ matrix.project }} --shard=${{ matrix.shard }}

      - name: Upload E2E Test Results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results-${{ matrix.project }}-${{ strategy.job-index }}
          path: test-results/
          retention-days: 3

      - name: Upload Blob Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blob-report-${{ matrix.project }}-${{ strategy.job-index }}
          path: blob-report/
          retention-days: 1

  merge-reports:
    name: Merge E2E Reports
    if: ${{ !cancelled() }}
    needs: [e2e-tests]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js and Dependencies
        uses: ./.github/actions/setup-node-deps

      - name: Download all blob reports
        uses: actions/download-artifact@v4
        with:
          path: all-blob-reports
          pattern: blob-report-*
          merge-multiple: true

      - name: Merge into unified HTML report
        run: npx playwright merge-reports --reporter html ./all-blob-reports

      - name: Upload unified HTML report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 14
