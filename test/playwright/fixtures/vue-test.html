<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blok Vue Adapter E2E Test</title>
  <script type="importmap">
  {
    "imports": {
      "vue": "/test/playwright/fixtures/vendor/vue.mjs"
    }
  }
  </script>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    #editor-container { border: 1px solid #ccc; min-height: 200px; padding: 10px; margin: 10px 0; }
    button { margin-right: 8px; padding: 4px 12px; }
    #output { white-space: pre-wrap; background: #f5f5f5; padding: 10px; margin-top: 10px; font-family: monospace; font-size: 12px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="module">
    import { createApp, h, ref } from 'vue';
    import { BlokEditor } from '/dist/vue.mjs?_v=1';

    const { Paragraph, Header } = await import('/dist/tools.mjs?_v=1');

    const App = {
      setup() {
        const status = ref('loading');
        const output = ref('');
        const data = ref({
          blocks: [{ id: 'block1', type: 'paragraph', data: { text: 'Hello from Vue' } }],
        });
        const readOnly = ref(false);
        const theme = ref('light');
        const width = ref('full');
        const editorRef = ref(null);

        const onReady = () => { status.value = 'ready'; };
        const save = async () => {
          const result = await editorRef.value?.save();
          output.value = JSON.stringify(result, null, 2);
        };

        return () => h('div', [
          h('div', { 'data-blok-testid': 'status' }, status.value),
          h('button', { 'data-blok-testid': 'save', onClick: save }, 'Save'),
          h('button', {
            'data-blok-testid': 'toggle-readonly',
            onClick: () => { readOnly.value = !readOnly.value; },
          }, readOnly.value ? 'Enable Editing' : 'Toggle Read Only'),
          h('button', {
            'data-blok-testid': 'toggle-theme',
            onClick: () => { theme.value = theme.value === 'light' ? 'dark' : 'light'; },
          }, 'Toggle Theme'),
          h('button', {
            'data-blok-testid': 'toggle-width',
            onClick: () => { width.value = width.value === 'full' ? 'narrow' : 'full'; },
          }, 'Toggle Width'),
          h(BlokEditor, {
            ref: editorRef,
            id: 'editor-container',
            'data-blok-testid': 'editor-container',
            tools: { paragraph: { class: Paragraph }, header: { class: Header } },
            data: data.value,
            readOnly: readOnly.value,
            theme: theme.value,
            width: width.value,
            onReady,
            'onUpdate:data': (next) => { data.value = next; },
          }),
          h('pre', { 'data-blok-testid': 'output', id: 'output' }, output.value),
        ]);
      },
    };

    createApp(App).mount('#root');
  </script>
</body>
</html>
