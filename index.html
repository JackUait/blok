  <style>
    /* Playground header */
    .playground-header {
      height: 56px;
      backdrop-filter: saturate(180%) blur(12px);
      -webkit-backdrop-filter: saturate(180%) blur(12px);
      background: rgba(255,255,255,0.78);
      position: sticky;
      top: 0;
      z-index: 20;
      transition: transform 240ms cubic-bezier(0.4, 0.0, 0.2, 1);
      will-change: transform;
    }
    .playground-header.is-hidden {
      transform: translateY(-100%);
    }
    .dark-mode .playground-header { background: rgba(25,25,24,0.78); }

    .playground-wordmark {
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 15px;
      letter-spacing: -0.02em;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .playground-wordmark__logo {
      width: 20px;
      height: 20px;
      display: block;
      flex-shrink: 0;
    }

    /* Playground tabs */
    .playground-tab {
      position: relative;
      padding: 0 14px;
      height: 56px;
      line-height: 56px;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: -0.005em;
      color: #8a8a8a;
      cursor: pointer;
      transition: color 0.18s ease;
      background: none;
      border: none;
      font-family: inherit;
      text-decoration: none;
    }
    .playground-tab:hover { color: #1a1a1a; }
    .playground-tab[aria-selected="true"] { color: #0a0a0a; font-weight: 600; }
    .playground-tab::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 50%;
      width: 0;
      height: 2px;
      background: #0a0a0a;
      border-radius: 2px 2px 0 0;
      transition: width 0.22s ease, left 0.22s ease;
    }
    .playground-tab[aria-selected="true"]::after {
      width: calc(100% - 28px);
      left: 14px;
    }

    /* Dark mode tab overrides */
    .dark-mode .playground-tab { color: #8a8580; }
    .dark-mode .playground-tab:hover { color: #ffffff; }
    .dark-mode .playground-tab[aria-selected="true"] { color: #ffffff; }
    .dark-mode .playground-tab::after { background: #ffffff; }

    /* Pill toggle switch */
    .pill-toggle {
      position: relative;
      width: 32px;
      height: 18px;
      background: #e6e4e0;
      border-radius: 999px;
      transition: background 0.18s ease;
      flex-shrink: 0;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,0.04);
    }
    .pill-toggle::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 14px;
      height: 14px;
      background: white;
      border-radius: 50%;
      transition: transform 0.22s cubic-bezier(0.4, 0.0, 0.2, 1), box-shadow 0.18s;
      box-shadow: 0 1px 2px rgba(0,0,0,0.08), 0 1px 3px rgba(0,0,0,0.12);
    }
    label:hover .pill-toggle::after {
      box-shadow: 0 1px 2px rgba(0,0,0,0.12), 0 2px 4px rgba(0,0,0,0.16);
    }
    input:checked + .pill-toggle {
      background: #e45735;
      box-shadow: inset 0 0 0 1px rgba(228,87,53,0.2), 0 0 0 0 rgba(228,87,53,0);
    }
    input:focus-visible + .pill-toggle {
      outline: 2px solid #e45735;
      outline-offset: 2px;
    }
    .dark-mode input:checked + .pill-toggle {
      background: #e45735;
    }
    .dark-mode .pill-toggle {
      background: #2a2826;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04);
    }
    input:checked + .pill-toggle::after {
      transform: translateX(14px);
    }

    /* Dark mode page styles */
    .dark-mode { background: #191919; color: #ffffff; }

    /* Icon gallery */
    .icon-gallery { padding: 48px 0 120px; }
    .icon-group { margin-bottom: 56px; }
    .icon-group-title {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: #8a8580;
      margin-bottom: 24px;
      padding-bottom: 12px;
      border-bottom: 1px solid #ececec;
      font-family: 'PT Mono', monospace;
    }
    .icon-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 2px;
    }
    .icon-cell {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 20px 12px;
      cursor: pointer;
    }
    .icon-cell .icon-preview {
      display: flex;
      align-items: center;
      justify-content: center;
      color: #1a1a1a;
    }
    .icon-cell .icon-preview svg {
      border: 1px dashed #d0d0d0;
      border-radius: 2px;
    }
    .icon-cell:hover .icon-preview svg {
      border-color: #999;
    }
    .icon-cell .icon-name {
      font-size: 10px;
      font-family: 'PT Mono', monospace;
      color: #999;
      text-align: center;
      word-break: break-all;
      transition: color 0.15s;
    }

    /* Dark mode icon gallery */
    .dark-mode .icon-group-title { color: #a39e98; border-bottom-color: #37352f; }
    .dark-mode .icon-cell .icon-preview svg { border-color: #37352f; }
    .dark-mode .icon-cell:hover .icon-preview svg { border-color: #a39e98; }
    .dark-mode .icon-cell .icon-preview { color: #ffffff; }
     .dark-mode .icon-cell .icon-name { color: #a39e98; }

    /* Icon lightbox */
    .icon-lightbox {
      position: fixed;
      inset: 0;
      background: rgba(15, 15, 15, 0.72);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10000;
      animation: icon-lightbox-fade 0.12s ease-out;
    }
    .icon-lightbox__content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      padding: 48px 64px;
      background: #ffffff;
      border-radius: 8px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      min-width: 280px;
    }
    .icon-lightbox__preview { color: #1a1a1a; }
    .icon-lightbox__preview svg { width: 96px; height: 96px; }
    .icon-lightbox__name {
      font-family: 'PT Mono', monospace;
      font-size: 13px;
      color: #1a1a1a;
    }
    .dark-mode .icon-lightbox__content { background: #252525; }
    .dark-mode .icon-lightbox__preview { color: #ffffff; }
    .dark-mode .icon-lightbox__name { color: #ffffff; }
    @keyframes icon-lightbox-fade {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* Settings panel polish */
    #settings-panel {
      box-shadow: -8px 0 24px -8px rgba(0,0,0,0.06), -1px 0 0 0 rgba(0,0,0,0.04);
    }
    .dark-mode #settings-panel {
      box-shadow: -8px 0 32px -8px rgba(0,0,0,0.4), -1px 0 0 0 rgba(255,255,255,0.05);
    }

    .settings-section-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: #8a8580;
      font-family: 'PT Mono', monospace;
      margin-bottom: 14px;
      display: block;
    }
    .dark-mode .settings-section-label { color: #8a8580; }

    .settings-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      padding: 6px 8px;
      margin: 0 -8px;
      border-radius: 6px;
      transition: background 0.12s ease;
    }
    .settings-row:hover { background: rgba(0,0,0,0.025); }
    .dark-mode .settings-row:hover { background: rgba(255,255,255,0.04); }

    .settings-row-label {
      font-size: 13px;
      font-weight: 450;
      color: #1a1a1a;
      display: flex;
      align-items: center;
      gap: 10px;
      letter-spacing: -0.005em;
    }
    .dark-mode .settings-row-label { color: #ffffff; }

    .settings-row-icon {
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #8a8580;
      transition: color 0.15s;
    }
    .settings-row:hover .settings-row-icon { color: #1a1a1a; }
    .dark-mode .settings-row:hover .settings-row-icon { color: #ffffff; }

    #settings-close {
      width: 28px;
      height: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      color: #8a8580;
      transition: background 0.12s ease, color 0.12s ease;
    }
    #settings-close:hover { background: rgba(0,0,0,0.05); color: #1a1a1a; }
    .dark-mode #settings-close:hover { background: rgba(255,255,255,0.06); color: #ffffff; }

    #select-notifier-position {
      font-size: 12px;
      padding: 5px 26px 5px 10px;
      border: 1px solid #e6e4e0;
      border-radius: 6px;
      color: #4a4a48;
      background: #fafaf8 url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 12 12' fill='none'><path d='M3 4.5L6 7.5L9 4.5' stroke='%238a8580' stroke-width='1.3' stroke-linecap='round' stroke-linejoin='round'/></svg>") no-repeat right 8px center;
      -webkit-appearance: none;
      appearance: none;
      cursor: pointer;
      transition: border-color 0.12s, background-color 0.12s;
      outline: none;
      font-family: inherit;
      letter-spacing: -0.005em;
    }
    #select-notifier-position:hover { border-color: #d4d2ce; background-color: #ffffff; }
    #select-notifier-position:focus { border-color: #e45735; box-shadow: 0 0 0 3px rgba(228,87,53,0.12); }
    .dark-mode #select-notifier-position {
      background-color: #1f1f1e;
      border-color: #37352f;
      color: #d4d2ce;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 12 12' fill='none'><path d='M3 4.5L6 7.5L9 4.5' stroke='%238a8580' stroke-width='1.3' stroke-linecap='round' stroke-linejoin='round'/></svg>");
    }
    .dark-mode #select-notifier-position:hover { border-color: #504d45; background-color: #242321; }

    #reset-content {
      width: 100%;
      font-size: 13px;
      font-weight: 500;
      padding: 9px 16px;
      border: 1px solid #e6e4e0;
      border-radius: 8px;
      color: #4a4a48;
      background: transparent;
      cursor: pointer;
      transition: all 0.12s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      letter-spacing: -0.005em;
    }
    #reset-content:hover { border-color: #1a1a1a; color: #1a1a1a; background: rgba(0,0,0,0.02); }
    #reset-content:active { transform: scale(0.985); }
    .dark-mode #reset-content { border-color: #37352f; color: #a39e98; }
    .dark-mode #reset-content:hover { border-color: #a39e98; color: #ffffff; background: rgba(255,255,255,0.03); }

    /* Settings side-tab handle */
    #settings-tab {
      transition:
        transform 320ms cubic-bezier(0.22, 1, 0.36, 1),
        opacity 220ms cubic-bezier(0.22, 1, 0.36, 1),
        background 0.15s ease,
        border-color 0.15s ease;
      box-shadow: -2px 0 12px -4px rgba(0,0,0,0.05);
      will-change: transform, opacity;
    }
    #settings-tab:hover { transform: translate(-2px, -50%); }
    /* Hide-on-scroll: slide out to the right + fade */
    #settings-tab.is-hidden,
    #settings-tab.is-hidden:hover {
      transform: translate(calc(100% + 8px), -50%);
      opacity: 0;
      pointer-events: none;
      box-shadow: none;
      transition:
        transform 260ms cubic-bezier(0.4, 0, 1, 1),
        opacity 180ms cubic-bezier(0.4, 0, 1, 1);
    }

    /* Dark mode overrides */
    .dark-mode .playground-header { border-color: #2a2826; }
    .dark-mode #main-content > div.playground-header a { color: #8a8580; }
    .dark-mode #main-content > div.playground-header a:hover { color: #ffffff; }
    .dark-mode #settings-tab { background: #191919; border-color: #2a2826; }
    .dark-mode #settings-tab:hover { background: #1f1f1e; }
    .dark-mode #settings-tab svg,
    .dark-mode #settings-tab span { color: #8a8580; }
    .dark-mode #settings-tab:hover svg,
    .dark-mode #settings-tab:hover span { color: #ffffff; }
    .dark-mode #settings-panel { background: #191918; border-color: #2a2826; }
    .dark-mode .settings-divider { border-color: #2a2826 !important; }
   </style>

    /**
     * Build Blok config from current state
     */
    function buildConfig() {
      const tools = {
        bold: Bold,
        italic: Italic,
        marker: Marker,
        underline: Underline,
        strikethrough: Strikethrough,
        inlineCode: InlineCode,
        link: Link,
      };
      if (state.tools.paragraph) tools.paragraph = { class: Paragraph, preserveBlank: true };
      if (state.tools.header) tools.header = { class: Header };
      if (state.tools.list) tools.list = List;
      if (state.tools.table) tools.table = Table;
      if (state.tools.toggle) tools.toggle = { class: Toggle, inlineToolbar: true };
      if (state.tools.callout) tools.callout = { class: Callout, inlineToolbar: true };
      if (state.tools.database) {
        tools.database = Database;
        tools['database-row'] = DatabaseRow;
      }
      if (state.tools.divider) tools.divider = Divider;
      if (state.tools.quote) tools.quote = { class: Quote, inlineToolbar: true };
      if (state.tools.code) tools.code = { class: Code, inlineToolbar: false };
      if (state.tools.image) tools.image = Image;
      return {
        readOnly: state.readOnly,
        holder: 'blok',
        tools,
        autofocus: state.autofocus,
        notifierPosition: state.notifierPosition,
        style: { contentAlign: 'center' },
        data: { blocks: structuredClone(DEFAULT_BLOCKS) },
        onChange(api, event) {
          console.log('something changed', event);
        },
      };
    }

    let blok = new Blok(buildConfig());
    window.blok = blok;

    /**
     * Reinitialize editor with current state.
     * Debounced to prevent zombie instances when toggling multiple checkboxes rapidly.
     */
    let reinitTimeout;
    function reinitEditor() {
      clearTimeout(reinitTimeout);
      reinitTimeout = setTimeout(() => {
        blok.destroy();
        blok = new Blok(buildConfig());
        window.blok = blok;
      }, 50);
    }

    /**
     * Page routing
     */
    const tabs = document.querySelectorAll('[role="tab"]');

    function navigateTo(page) {
      tabs.forEach(t => t.setAttribute('aria-selected', t.dataset.tab === page ? 'true' : 'false'));
      document.getElementById('tab-editor').classList.toggle('hidden', page !== 'editor');
      document.getElementById('tab-icons').classList.toggle('hidden', page !== 'icons');
    }

    tabs.forEach(tab => {
      tab.addEventListener('click', (e) => {
        e.preventDefault();
        const page = tab.dataset.tab;
        history.pushState(null, '', `/${page}`);
        navigateTo(page);
      });
    });

    window.addEventListener('popstate', () => {
      const page = window.location.pathname === '/icons' ? 'icons' : 'editor';
      navigateTo(page);
    });

    // Initial route
    const initialPage = window.location.pathname === '/icons' ? 'icons' : 'editor';
    if (window.location.pathname !== '/editor' && window.location.pathname !== '/icons') {
      history.replaceState(null, '', '/editor');
    }
    navigateTo(initialPage);

    /**
     * Hide playground header on scroll down, show on scroll up.
     */
    (() => {
      const header = document.querySelector('.playground-header');
      if (!header) return;
      const HIDE_THRESHOLD = 80;
      let lastY = window.scrollY;
      let ticking = false;
      const update = () => {
        const y = window.scrollY;
        if (y <= HIDE_THRESHOLD) {
          header.classList.remove('is-hidden');
        } else if (y > lastY) {
          header.classList.add('is-hidden');
        } else if (y < lastY) {
          header.classList.remove('is-hidden');
        }
        lastY = y;
        ticking = false;
      };
      window.addEventListener('scroll', () => {
        if (!ticking) {
          ticking = true;
          window.requestAnimationFrame(update);
        }
      }, { passive: true });
    })();

    /**
     * Settings panel open/close
     */
    const settingsTab = document.getElementById('settings-tab');
    const settingsPanel = document.getElementById('settings-panel');
    const settingsClose = document.getElementById('settings-close');
    const mainContent = document.getElementById('main-content');

    function openSettingsPanel() {
      settingsPanel.style.transform = '';
      settingsPanel.classList.remove('translate-x-full');
      settingsTab.classList.add('hidden');
      mainContent.style.marginRight = '300px';
    }

    function closeSettingsPanel() {
      settingsPanel.classList.add('translate-x-full');
      settingsTab.classList.remove('hidden');
      mainContent.style.marginRight = '0';
    }

    function toggleSettingsPanel() {
      if (settingsPanel.classList.contains('translate-x-full')) {
        openSettingsPanel();
      } else {
        closeSettingsPanel();
      }
    }

    settingsTab.addEventListener('click', openSettingsPanel);
    settingsClose.addEventListener('click', closeSettingsPanel);

    document.addEventListener('keydown', (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === '\\') {
        e.preventDefault();
        toggleSettingsPanel();
      }
    });

    /**
     * Mode toggles
     */
    const toggleReadonly = document.getElementById('toggle-readonly');
    const toggleDark = document.getElementById('toggle-dark');
    const toggleAutofocus = document.getElementById('toggle-autofocus');

    /**
     * Applies or removes dark mode on the page and Blok theme.
     * Single source of truth used by the manual toggle and the system
     * preference change listener.
     */
    function applyDarkMode(enabled) {
      state.darkMode = enabled;
      toggleDark.checked = enabled;
      document.body.classList.toggle('dark-mode', enabled);
      if (enabled) {
        document.documentElement.setAttribute('data-blok-theme', 'dark');
      } else {
        const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (systemPrefersDark) {
          // System is dark but user explicitly wants light — use "light" override
          // so the @media dark rule's :not([data-blok-theme="light"]) guard fires
          document.documentElement.setAttribute('data-blok-theme', 'light');
        } else {
          document.documentElement.removeAttribute('data-blok-theme');
        }
      }
    }

    // Apply initial dark mode based on system preference
    applyDarkMode(state.darkMode);

    // Keep in sync when the system preference changes
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
      applyDarkMode(e.matches);
    });

    toggleReadonly.addEventListener('change', async () => {
      state.readOnly = toggleReadonly.checked;
      await blok.readOnly.toggle(state.readOnly);
    });

    toggleDark.addEventListener('change', () => {
      applyDarkMode(toggleDark.checked);
    });

    toggleAutofocus.addEventListener('change', () => {
      state.autofocus = toggleAutofocus.checked;
    });

    const selectNotifierPosition = document.getElementById('select-notifier-position');
    selectNotifierPosition.addEventListener('change', () => {
      state.notifierPosition = selectNotifierPosition.value;
      reinitEditor();
    });

    /**
     * Tool toggle definitions and rendering
     */
    const TOOL_DEFS = [
      { key: 'paragraph', label: 'Paragraph', icon: Icons.IconText },
      { key: 'header', label: 'Header', icon: Icons.IconHeading },
      { key: 'list', label: 'List', icon: Icons.IconListBulleted },
      { key: 'table', label: 'Table', icon: Icons.IconTable },
      { key: 'toggle', label: 'Toggle', icon: '<svg width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4.5 2.5L8.5 6L4.5 9.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>' },
      { key: 'callout', label: 'Callout', icon: Icons.IconCallout },
      { key: 'database', label: 'Database', icon: Icons.IconDatabase },
      { key: 'divider', label: 'Divider', icon: Icons.IconDivider },
      { key: 'quote', label: 'Quote', icon: Icons.IconQuote },
    ];

    const toolTogglesContainer = document.getElementById('tool-toggles');

    for (const tool of TOOL_DEFS) {
      const label = document.createElement('label');
      label.className = 'settings-row';
      label.innerHTML = `
        <span class="settings-row-label">
          <span class="settings-row-icon">${tool.icon}</span>
          ${tool.label}
        </span>
        <input type="checkbox" id="toggle-tool-${tool.key}" class="peer sr-only" checked>
        <span class="pill-toggle"></span>
      `;
      toolTogglesContainer.appendChild(label);
    }

    for (const tool of TOOL_DEFS) {
      const checkbox = document.getElementById(`toggle-tool-${tool.key}`);
      checkbox.addEventListener('change', () => {
        state.tools[tool.key] = checkbox.checked;
        reinitEditor();
      });
    }

    /**
     * Reset content
     */
    document.getElementById('reset-content').addEventListener('click', () => {
      reinitEditor();
    });

    /**
     * Icon gallery - group icons by category and render them
     */
    const iconGroups = {
      'UI & Navigation': ['IconCheck', 'IconWand', 'IconCross', 'IconMenu', 'IconPlus', 'IconChevronLeft', 'IconChevronRight', 'IconChevronDown', 'IconSearch'],
      'Inline Formatting': ['IconBold', 'IconItalic', 'IconUnderline', 'IconStrikethrough', 'IconLink', 'IconMarker', 'IconReplace', 'IconGlobe', 'IconMail', 'IconHash', 'IconCode'],
      'Headings': ['IconHeading', 'IconH1', 'IconH2', 'IconH3', 'IconH4', 'IconH5', 'IconH6'],
      'Block Tools': ['IconText', 'IconListBulleted', 'IconListNumbered', 'IconListChecklist', 'IconTable', 'IconToggleList', 'IconCallout', 'IconDatabase', 'IconBoard', 'IconGallery', 'IconList', 'IconDivider', 'IconQuote', 'IconCodeBlock', 'IconCalendar'],
      'Media': ['IconImage'],
      'Toggle Headings': ['IconToggleH1', 'IconToggleH2', 'IconToggleH3'],
      'Table Actions': ['IconHeaderRow', 'IconHeaderColumn', 'IconInsertAbove', 'IconInsertBelow', 'IconInsertLeft', 'IconInsertRight', 'IconMoveUp', 'IconMoveDown', 'IconMoveLeft', 'IconMoveRight', 'IconMergeCells', 'IconSplitCell', 'IconPlacement'],
      'Utility': ['IconCopy', 'IconTrash', 'IconPencil', 'IconWarning', 'IconPaintRoller', 'IconPreview', 'IconSplitView', 'IconDotsHorizontal'],
      'Emoji Picker': ['IconEmojiStar', 'IconEmojiSmile', 'IconEmojiSprout', 'IconEmojiUtensils', 'IconEmojiBall', 'IconEmojiGlobe', 'IconEmojiLightbulb', 'IconEmojiHash', 'IconEmojiFlag'],
    };

    renderIconGallery({
      container: document.getElementById('icon-gallery'),
      iconGroups,
      icons: Icons,
    });

    // Reveal page once editor is ready (Tailwind CSS is injected during Blok init)
    blok.isReady.then(() => document.body.classList.add('ready'));
  </script>
</body>
