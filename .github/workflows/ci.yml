name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["**"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  i18n:
    name: i18n Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js and Dependencies
        uses: ./.github/actions/setup-node-deps

      - name: Check translations
        run: node scripts/i18n/check-translations.mjs

      - name: Check docs translations
        run: node scripts/i18n/check-docs-translations.mjs

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js and Dependencies
        uses: ./.github/actions/setup-node-deps

      - name: Restore lint cache
        id: lint-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules/.cache/blok-eslint
            node_modules/.cache/blok-lint.tsbuildinfo
          # v2: v1 caches are poisoned — ESLint's cache persists per-file results
          # INCLUDING errors, keyed only on that file's own content, so an error
          # computed against broken types replays on every later run even after
          # the types are fixed. Bump the version to abandon them.
          key: lint-v2-${{ runner.os }}-${{ hashFiles('yarn.lock', 'eslint.config.mjs', 'tsconfig.json') }}-${{ github.sha }}
          restore-keys: |
            lint-v2-${{ runner.os }}-${{ hashFiles('yarn.lock', 'eslint.config.mjs', 'tsconfig.json') }}-

      - name: Lint
        run: yarn lint

      # Save only after a green lint: a failed run's ESLint cache carries the
      # error entries, and restoring one replays those stale errors for every
      # file whose content didn't change since the failure.
      - name: Save lint cache
        if: success() && steps.lint-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            node_modules/.cache/blok-eslint
            node_modules/.cache/blok-lint.tsbuildinfo
          key: ${{ steps.lint-cache.outputs.cache-primary-key }}

  unit-tests:
    name: Unit Tests (${{ matrix.shard }})
    needs: [build]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: ["1/2", "2/2"]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js and Dependencies
        uses: ./.github/actions/setup-node-deps

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          # Archive keeps repo-relative paths (dist/, packages/*/dist/); extract at root.
          path: .

      - name: Build CLI
        run: yarn build:cli

      - name: Run Unit Tests
        run: yarn test --shard=${{ matrix.shard }}

  validate-spec-coverage:
    name: Validate Spec File Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js and Dependencies
        uses: ./.github/actions/setup-node-deps

      - name: Validate all spec files match a Playwright project
        run: yarn validate:spec-coverage

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js and Dependencies
        uses: ./.github/actions/setup-node-deps

      - name: Build
        run: yarn build

      # The adapters were extracted into packages/*/dist (they used to live under
      # dist/). Downstream jobs (Unit's bundle-outputs test, E2E's react-adapter
      # fixture) load those built adapter bundles, so they must travel in the
      # artifact too. The common ancestor of these paths is the repo root, so the
      # archive keeps each path at its repo-relative location — download steps
      # therefore extract at the repo root (path: .), not into dist/.
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: |
            dist/
            packages/react/dist/
            packages/vue/dist/
            packages/angular/dist/
          retention-days: 1

  install-browsers:
    name: Install Browsers
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Node is pinned to 24.14.1 because `playwright install` (< 1.60.0) hangs forever
      # after the browser download on Node >= 24.16 (vendored-yauzl extract bug,
      # microsoft/playwright#40998). Remove the pin after bumping @playwright/test to >= 1.60.0.
      - name: Setup Node.js and Dependencies
        uses: ./.github/actions/setup-node-deps
        with:
          node-version: 24.14.1

      - name: Setup Playwright Browsers
        uses: ./.github/actions/setup-playwright-browsers
        with:
          browsers: chromium firefox webkit

  e2e-tests:
    name: E2E Tests
    needs: [build, install-browsers]
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: chromium
            browser: chromium
            shard: 1/3
          - project: chromium
            browser: chromium
            shard: 2/3
          - project: chromium
            browser: chromium
            shard: 3/3
          - project: firefox
            browser: firefox
            shard: 1/4
          - project: firefox
            browser: firefox
            shard: 2/4
          - project: firefox
            browser: firefox
            shard: 3/4
          - project: firefox
            browser: firefox
            shard: 4/4
          - project: webkit
            browser: webkit
            shard: 1/5
          - project: webkit
            browser: webkit
            shard: 2/5
          - project: webkit
            browser: webkit
            shard: 3/5
          - project: webkit
            browser: webkit
            shard: 4/5
          - project: webkit
            browser: webkit
            shard: 5/5
          - project: chromium-logic
            browser: chromium
            shard: 1/4
          - project: chromium-logic
            browser: chromium
            shard: 2/4
          - project: chromium-logic
            browser: chromium
            shard: 3/4
          - project: chromium-logic
            browser: chromium
            shard: 4/4
    uses: ./.github/workflows/e2e.yml
    with:
      artifact-name: dist
      project: ${{ matrix.project }}
      browser: ${{ matrix.browser }}
      shard: ${{ matrix.shard }}
      artifact-index: ${{ strategy.job-index }}

  merge-reports:
    name: Merge E2E Reports
    if: ${{ !cancelled() && github.ref != 'refs/heads/master' }}
    needs: [e2e-tests]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js and Dependencies
        uses: ./.github/actions/setup-node-deps

      - name: Download all blob reports
        uses: actions/download-artifact@v4
        with:
          path: all-blob-reports
          pattern: blob-report-*
          merge-multiple: true

      - name: Merge into unified HTML report
        run: |
          if [ -d ./all-blob-reports ] && [ -n "$(ls -A ./all-blob-reports 2>/dev/null)" ]; then
            npx playwright merge-reports --reporter html ./all-blob-reports
          else
            echo "No blob reports found (e2e tests were skipped or cancelled); nothing to merge."
          fi

      - name: Upload unified HTML report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 14

  storybook-tests:
    name: Storybook Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Node is pinned to 24.14.1 because `playwright install` (< 1.60.0) hangs forever
      # after the browser download on Node >= 24.16 (vendored-yauzl extract bug,
      # microsoft/playwright#40998). Remove the pin after bumping @playwright/test to >= 1.60.0.
      - name: Setup Node.js and Dependencies
        uses: ./.github/actions/setup-node-deps
        with:
          node-version: 24.14.1

      # Storybook tests only run in chromium (see vitest.config.ts). Installing all
      # browsers triggered ~2h CDN-throttled downloads that never finished.
      - name: Setup Playwright Browsers
        uses: ./.github/actions/setup-playwright-browsers
        with:
          browsers: chromium
          cache-key-prefix: playwright-storybook

      - name: Run Storybook Tests
        run: yarn storybook:test
