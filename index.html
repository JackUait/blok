<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Blok</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48x48.png">
  <link rel="icon" type="image/png" sizes="64x64" href="/favicon-64x64.png">
  <link rel="icon" type="image/png" sizes="128x128" href="/favicon-128x128.png">
  <link rel="icon" type="image/png" sizes="256x256" href="/favicon-256x256.png">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <!-- Disable caching for local development -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=PT+Mono&display=swap" rel="stylesheet">
  <style>
    /* Prevent FOUC: body hidden until module script adds .ready */
    body:not(.ready) { visibility: hidden !important; }
  </style>
  <style>
    /* Playground header */
    .playground-header {
      height: 56px;
      backdrop-filter: saturate(180%) blur(12px);
      -webkit-backdrop-filter: saturate(180%) blur(12px);
      background: rgba(255,255,255,0.78);
      position: sticky;
      top: 0;
      z-index: 20;
      transition: transform 240ms cubic-bezier(0.4, 0.0, 0.2, 1);
      will-change: transform;
    }
    .playground-header.is-hidden {
      transform: translateY(-100%);
    }
    .dark-mode .playground-header { background: rgba(25,25,24,0.78); }

    .playground-wordmark {
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 15px;
      letter-spacing: -0.02em;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .playground-wordmark__logo {
      width: 20px;
      height: 20px;
      display: block;
      flex-shrink: 0;
    }

    /* Playground tabs */
    .playground-tab {
      position: relative;
      padding: 0 14px;
      height: 56px;
      line-height: 56px;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: -0.005em;
      color: #8a8a8a;
      cursor: pointer;
      transition: color 0.18s ease;
      background: none;
      border: none;
      font-family: inherit;
      text-decoration: none;
    }
    .playground-tab:hover { color: #1a1a1a; }
    .playground-tab[aria-selected="true"] { color: #0a0a0a; font-weight: 600; }
    .playground-tab::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 50%;
      width: 0;
      height: 2px;
      background: #0a0a0a;
      border-radius: 2px 2px 0 0;
      transition: width 0.22s ease, left 0.22s ease;
    }
    .playground-tab[aria-selected="true"]::after {
      width: calc(100% - 28px);
      left: 14px;
    }

    /* Dark mode tab overrides */
    .dark-mode .playground-tab { color: #8a8580; }
    .dark-mode .playground-tab:hover { color: #ffffff; }
    .dark-mode .playground-tab[aria-selected="true"] { color: #ffffff; }
    .dark-mode .playground-tab::after { background: #ffffff; }

    /* Pill toggle switch */
    .pill-toggle {
      position: relative;
      width: 32px;
      height: 18px;
      background: #e6e4e0;
      border-radius: 999px;
      transition: background 0.18s ease;
      flex-shrink: 0;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,0.04);
    }
    .pill-toggle::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 14px;
      height: 14px;
      background: white;
      border-radius: 50%;
      transition: transform 0.22s cubic-bezier(0.4, 0.0, 0.2, 1), box-shadow 0.18s;
      box-shadow: 0 1px 2px rgba(0,0,0,0.08), 0 1px 3px rgba(0,0,0,0.12);
    }
    label:hover .pill-toggle::after {
      box-shadow: 0 1px 2px rgba(0,0,0,0.12), 0 2px 4px rgba(0,0,0,0.16);
    }
    input:checked + .pill-toggle {
      background: #e45735;
      box-shadow: inset 0 0 0 1px rgba(228,87,53,0.2), 0 0 0 0 rgba(228,87,53,0);
    }
    input:focus-visible + .pill-toggle {
      outline: 2px solid #e45735;
      outline-offset: 2px;
    }
    .dark-mode input:checked + .pill-toggle {
      background: #e45735;
    }
    .dark-mode .pill-toggle {
      background: #2a2826;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04);
    }
    input:checked + .pill-toggle::after {
      transform: translateX(14px);
    }

    /* Dark mode page styles */
    .dark-mode { background: #191919; color: #ffffff; }

    /* Block states gallery */
    .block-states-gallery { padding: 32px 0 120px; }
    .block-states-tabs {
      display: flex;
      gap: 2px;
      flex-wrap: wrap;
      padding-bottom: 16px;
      margin-bottom: 32px;
      border-bottom: 1px solid #ececec;
      position: sticky;
      top: 56px;
      background: rgba(255,255,255,0.9);
      backdrop-filter: saturate(180%) blur(10px);
      -webkit-backdrop-filter: saturate(180%) blur(10px);
      z-index: 5;
      padding-top: 16px;
      transition: top 240ms cubic-bezier(0.4, 0.0, 0.2, 1);
    }
    .header-hidden .block-states-tabs { top: 0; }
    .dark-mode .block-states-tabs {
      background: rgba(25,25,25,0.9);
      border-bottom-color: #2a2826;
    }
    .block-states-tab {
      font-family: 'PT Mono', monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 8px 14px;
      border: 1px solid transparent;
      border-radius: 999px;
      background: transparent;
      color: #8a8580;
      cursor: pointer;
      transition: color 0.15s, background 0.15s, border-color 0.15s;
    }
    .block-states-tab:hover { color: #1a1a1a; background: rgba(0,0,0,0.03); }
    .block-states-tab[aria-selected="true"] {
      color: #0a0a0a;
      background: #0a0a0a;
      color: #ffffff;
      border-color: #0a0a0a;
    }
    .dark-mode .block-states-tab { color: #a39e98; }
    .dark-mode .block-states-tab:hover { color: #ffffff; background: rgba(255,255,255,0.04); }
    .dark-mode .block-states-tab[aria-selected="true"] {
      background: #ffffff;
      color: #191919;
      border-color: #ffffff;
    }
    .block-states-panels {
      max-width: 720px;
      margin: 0 auto;
    }
    .block-states-panel { display: block; }
    .block-states-panel.hidden { display: none; }
    .block-states-preview {
      padding: 0;
    }

    /* Icon gallery */
    .icon-gallery { padding: 48px 0 120px; }
    .icon-group { margin-bottom: 56px; }
    .icon-group-title {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: #8a8580;
      margin-bottom: 24px;
      padding-bottom: 12px;
      border-bottom: 1px solid #ececec;
      font-family: 'PT Mono', monospace;
    }
    .icon-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 2px;
    }
    .icon-cell {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 20px 12px;
      cursor: pointer;
    }
    .icon-cell .icon-preview {
      display: flex;
      align-items: center;
      justify-content: center;
      color: #1a1a1a;
    }
    .icon-cell .icon-preview svg {
      border: 1px dashed #d0d0d0;
      border-radius: 2px;
    }
    .icon-cell:hover .icon-preview svg {
      border-color: #999;
    }
    .icon-cell .icon-name {
      font-size: 10px;
      font-family: 'PT Mono', monospace;
      color: #999;
      text-align: center;
      word-break: break-all;
      transition: color 0.15s;
    }

    /* Dark mode icon gallery */
    .dark-mode .icon-group-title { color: #a39e98; border-bottom-color: #37352f; }
    .dark-mode .icon-cell .icon-preview svg { border-color: #37352f; }
    .dark-mode .icon-cell:hover .icon-preview svg { border-color: #a39e98; }
    .dark-mode .icon-cell .icon-preview { color: #ffffff; }
     .dark-mode .icon-cell .icon-name { color: #a39e98; }

    /* Icon lightbox */
    .icon-lightbox {
      position: fixed;
      inset: 0;
      background: rgba(15, 15, 15, 0.72);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10000;
      animation: icon-lightbox-backdrop-in 0.18s ease-out both;
    }
    .icon-lightbox.icon-lightbox--closing {
      animation: icon-lightbox-backdrop-out 0.16s ease-in forwards;
      pointer-events: none;
    }
    .icon-lightbox__content {
      animation: icon-lightbox-content-in 0.22s cubic-bezier(0.2, 0.9, 0.3, 1.1) both;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      padding: 40px 56px;
      background: #ffffff;
      border-radius: 10px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      min-width: 360px;
      position: relative;
    }
    .icon-lightbox__preview {
      color: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 160px;
      height: 160px;
      border-radius: 8px;
      transition: background 0.15s ease;
    }
    .icon-lightbox__preview[data-bg="transparent"] {
      background: transparent;
      background-image:
        linear-gradient(45deg, #f0f0f0 25%, transparent 25%),
        linear-gradient(-45deg, #f0f0f0 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #f0f0f0 75%),
        linear-gradient(-45deg, transparent 75%, #f0f0f0 75%);
      background-size: 12px 12px;
      background-position: 0 0, 0 6px, 6px -6px, -6px 0;
    }
    .icon-lightbox__preview[data-bg="light"] { background: #ffffff; border: 1px solid #ececec; }
    .icon-lightbox__preview[data-bg="dark"] { background: #191919; color: #ffffff; }
    .icon-lightbox__name {
      font-family: 'PT Mono', monospace;
      font-size: 13px;
      color: #1a1a1a;
    }
    .icon-lightbox__controls {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
    }
    .icon-lightbox__field {
      display: grid;
      grid-template-columns: 56px 1fr auto;
      align-items: center;
      gap: 12px;
      font-family: 'PT Mono', monospace;
      font-size: 11px;
    }
    .icon-lightbox__field-label {
      color: #8a8580;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .icon-lightbox__field-value {
      color: #1a1a1a;
      font-variant-numeric: tabular-nums;
      min-width: 32px;
      text-align: right;
    }
    .icon-lightbox__slider {
      -webkit-appearance: none;
      appearance: none;
      height: 2px;
      background: #ececec;
      border-radius: 2px;
      cursor: pointer;
    }
    .icon-lightbox__slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #1a1a1a;
      cursor: pointer;
    }
    .icon-lightbox__slider::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #1a1a1a;
      border: none;
      cursor: pointer;
    }
    .icon-lightbox__color {
      width: 28px;
      height: 28px;
      border: 1px solid #ececec;
      border-radius: 6px;
      padding: 0;
      background: none;
      cursor: pointer;
    }
    .icon-lightbox__color::-webkit-color-swatch-wrapper { padding: 2px; }
    .icon-lightbox__color::-webkit-color-swatch { border: none; border-radius: 4px; }
    .icon-lightbox__toolbar {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .icon-lightbox__btn {
      font-family: 'PT Mono', monospace;
      font-size: 11px;
      padding: 8px 12px;
      border: 1px solid #ececec;
      border-radius: 6px;
      background: #ffffff;
      color: #1a1a1a;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s;
    }
    .icon-lightbox__btn:hover { background: #f6f6f4; border-color: #d0d0d0; }
    .icon-lightbox__btn:active { background: #ececec; }
    .icon-lightbox__feedback {
      position: absolute;
      bottom: -28px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'PT Mono', monospace;
      font-size: 11px;
      color: #1a1a1a;
      opacity: 0;
      transition: opacity 0.12s;
      pointer-events: none;
    }
    .icon-lightbox__feedback--visible { opacity: 1; }
    .dark-mode .icon-lightbox__content { background: #252525; }
    .dark-mode .icon-lightbox__preview { color: #ffffff; }
    .dark-mode .icon-lightbox__preview[data-bg="transparent"] {
      background-image:
        linear-gradient(45deg, #2a2a2a 25%, transparent 25%),
        linear-gradient(-45deg, #2a2a2a 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #2a2a2a 75%),
        linear-gradient(-45deg, transparent 75%, #2a2a2a 75%);
    }
    .dark-mode .icon-lightbox__preview[data-bg="light"] { background: #ffffff; color: #1a1a1a; border-color: #37352f; }
    .dark-mode .icon-lightbox__preview[data-bg="dark"] { background: #191919; color: #ffffff; }
    .dark-mode .icon-lightbox__name { color: #ffffff; }
    .dark-mode .icon-lightbox__field-label { color: #a39e98; }
    .dark-mode .icon-lightbox__field-value { color: #ffffff; }
    .dark-mode .icon-lightbox__slider { background: #37352f; }
    .dark-mode .icon-lightbox__slider::-webkit-slider-thumb { background: #ffffff; }
    .dark-mode .icon-lightbox__slider::-moz-range-thumb { background: #ffffff; }
    .dark-mode .icon-lightbox__color { border-color: #37352f; }
    .dark-mode .icon-lightbox__btn { background: #2a2a2a; border-color: #37352f; color: #ffffff; }
    .dark-mode .icon-lightbox__btn:hover { background: #333; border-color: #555; }
    .dark-mode .icon-lightbox__feedback { color: #ffffff; }
    .icon-lightbox--closing .icon-lightbox__content {
      animation: icon-lightbox-content-out 0.16s ease-in forwards;
    }
    @keyframes icon-lightbox-backdrop-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes icon-lightbox-backdrop-out {
      from { opacity: 1; }
      to { opacity: 0; }
    }
    @keyframes icon-lightbox-content-in {
      from { opacity: 0; transform: translateY(8px) scale(0.94); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes icon-lightbox-content-out {
      from { opacity: 1; transform: translateY(0) scale(1); }
      to { opacity: 0; transform: translateY(4px) scale(0.96); }
    }

    /* Settings panel polish */
    #settings-panel {
      box-shadow: -8px 0 24px -8px rgba(0,0,0,0.06), -1px 0 0 0 rgba(0,0,0,0.04);
    }
    .dark-mode #settings-panel {
      box-shadow: -8px 0 32px -8px rgba(0,0,0,0.4), -1px 0 0 0 rgba(255,255,255,0.05);
    }

    .settings-section-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: #8a8580;
      font-family: 'PT Mono', monospace;
      margin-bottom: 14px;
      display: block;
    }
    .dark-mode .settings-section-label { color: #8a8580; }

    .settings-row {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      padding: 6px 8px;
      margin: 0 -8px;
      border-radius: 6px;
      transition: background 0.12s ease;
    }
    .settings-row > .settings-row-label { flex: 1; }
    .settings-row:hover { background: rgba(0,0,0,0.025); }
    .dark-mode .settings-row:hover { background: rgba(255,255,255,0.04); }

    .settings-kbd {
      font-family: 'PT Mono', monospace;
      font-size: 10px;
      line-height: 1;
      padding: 3px 5px;
      border: 1px solid #e6e4e0;
      border-radius: 4px;
      background: #fafaf8;
      color: #8a8580;
      letter-spacing: 0.02em;
      white-space: nowrap;
    }
    .dark-mode .settings-kbd {
      border-color: #37352f;
      background: #1f1f1e;
      color: #a39e98;
    }

    .settings-row-label {
      font-size: 13px;
      font-weight: 450;
      color: #1a1a1a;
      display: flex;
      align-items: center;
      gap: 10px;
      letter-spacing: -0.005em;
    }
    .dark-mode .settings-row-label { color: #ffffff; }

    .settings-row-icon {
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #8a8580;
      transition: color 0.15s;
    }
    .settings-row:hover .settings-row-icon { color: #1a1a1a; }
    .dark-mode .settings-row:hover .settings-row-icon { color: #ffffff; }

    #settings-close {
      width: 28px;
      height: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      margin: -4px -6px -4px 0; /* negative margin: visual edge aligns w/ content inset */
      border: 0;
      border-radius: 7px;
      background: transparent;
      color: #8a8580;
      cursor: pointer;
      outline: none;
      -webkit-appearance: none;
      appearance: none;
      transition: background-color 0.15s ease, color 0.15s ease, transform 0.08s ease;
    }
    #settings-close svg { display: block; transition: transform 0.18s cubic-bezier(0.4,0,0.2,1); }
    #settings-close:hover { background: rgba(0,0,0,0.05); color: #1a1a1a; }
    #settings-close:hover svg { transform: rotate(90deg); }
    #settings-close:active { transform: scale(0.92); background: rgba(0,0,0,0.08); }
    #settings-close:focus-visible { box-shadow: 0 0 0 2px rgba(228,87,53,0.45); }
    .dark-mode #settings-close { color: #a39e98; }
    .dark-mode #settings-close:hover { background: rgba(255,255,255,0.07); color: #ffffff; }
    .dark-mode #settings-close:active { background: rgba(255,255,255,0.11); }

    #select-notifier-position {
      font-size: 12px;
      padding: 5px 26px 5px 10px;
      border: 1px solid #e6e4e0;
      border-radius: 6px;
      color: #4a4a48;
      background: #fafaf8 url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 12 12' fill='none'><path d='M3 4.5L6 7.5L9 4.5' stroke='%238a8580' stroke-width='1.3' stroke-linecap='round' stroke-linejoin='round'/></svg>") no-repeat right 8px center;
      -webkit-appearance: none;
      appearance: none;
      cursor: pointer;
      transition: border-color 0.12s, background-color 0.12s;
      outline: none;
      font-family: inherit;
      letter-spacing: -0.005em;
    }
    #select-notifier-position:hover { border-color: #d4d2ce; background-color: #ffffff; }
    #select-notifier-position:focus { border-color: #e45735; box-shadow: 0 0 0 3px rgba(228,87,53,0.12); }
    .dark-mode #select-notifier-position {
      background-color: #1f1f1e;
      border-color: #37352f;
      color: #d4d2ce;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 12 12' fill='none'><path d='M3 4.5L6 7.5L9 4.5' stroke='%238a8580' stroke-width='1.3' stroke-linecap='round' stroke-linejoin='round'/></svg>");
    }
    .dark-mode #select-notifier-position:hover { border-color: #504d45; background-color: #242321; }

    #reset-content {
      width: 100%;
      font-size: 13px;
      font-weight: 500;
      padding: 9px 16px;
      border: 1px solid #e6e4e0;
      border-radius: 8px;
      color: #4a4a48;
      background: transparent;
      cursor: pointer;
      transition: all 0.12s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      letter-spacing: -0.005em;
    }
    #reset-content:hover { border-color: #1a1a1a; color: #1a1a1a; background: rgba(0,0,0,0.02); }
    #reset-content:active { transform: scale(0.985); }
    .dark-mode #reset-content { border-color: #37352f; color: #a39e98; }
    .dark-mode #reset-content:hover { border-color: #a39e98; color: #ffffff; background: rgba(255,255,255,0.03); }

    /* Settings side-tab handle */
    #settings-tab {
      transition:
        transform 320ms cubic-bezier(0.22, 1, 0.36, 1),
        opacity 220ms cubic-bezier(0.22, 1, 0.36, 1),
        background 0.15s ease,
        border-color 0.15s ease;
      box-shadow: -2px 0 12px -4px rgba(0,0,0,0.05);
      will-change: transform, opacity;
    }
    #settings-tab:hover { transform: translate(-2px, -50%); }
    /* Hide-on-scroll: slide out right + fade */
    #settings-tab.is-hidden,
    #settings-tab.is-hidden:hover {
      transform: translate(calc(100% + 8px), -50%);
      opacity: 0;
      pointer-events: none;
      box-shadow: none;
      transition:
        transform 260ms cubic-bezier(0.4, 0, 1, 1),
        opacity 180ms cubic-bezier(0.4, 0, 1, 1);
    }

    /* Dark mode overrides */
    .dark-mode .playground-header { border-color: #2a2826; }
    .dark-mode #main-content > div.playground-header a { color: #8a8580; }
    .dark-mode #main-content > div.playground-header a:hover { color: #ffffff; }
    .dark-mode #settings-tab { background: #191919; border-color: #2a2826; }
    .dark-mode #settings-tab:hover { background: #1f1f1e; }
    .dark-mode #settings-tab svg,

    /**
     * Build Blok config from current state
     */
    function buildConfig() {
      const tools = {
        bold: Bold,
        italic: Italic,
        marker: Marker,
        underline: Underline,
        strikethrough: Strikethrough,
        inlineCode: InlineCode,
        link: Link,
      };
      if (state.tools.paragraph) tools.paragraph = { class: Paragraph, preserveBlank: true };
      if (state.tools.header) tools.header = { class: Header };
      if (state.tools.list) tools.list = List;
      if (state.tools.table) tools.table = Table;
      if (state.tools.toggle) tools.toggle = { class: Toggle, inlineToolbar: true };
      if (state.tools.callout) tools.callout = { class: Callout, inlineToolbar: true };
      if (state.tools.database) {
        tools.database = Database;
        tools['database-row'] = DatabaseRow;
      }
      if (state.tools.divider) tools.divider = Divider;
      if (state.tools.quote) tools.quote = { class: Quote, inlineToolbar: true };
      if (state.tools.code) tools.code = { class: Code, inlineToolbar: false };
      if (state.tools.image) tools.image = Image;
      return {
        readOnly: state.readOnly,
        holder: 'blok',
        tools,
        autofocus: state.autofocus,
        notifierPosition: state.notifierPosition,
        style: { contentAlign: 'center' },
        data: { blocks: structuredClone(DEFAULT_BLOCKS) },
        onChange(api, event) {
          console.log('something changed', event);
        },
      };
    }

    let blok = new Blok(buildConfig());
    window.blok = blok;

    /**
     * Reinitialize editor with current state.
     * Debounced to prevent zombie instances when toggling multiple checkboxes rapidly.
     */
    let reinitTimeout;
    function reinitEditor() {
      clearTimeout(reinitTimeout);
      reinitTimeout = setTimeout(() => {
        blok.destroy();
        blok = new Blok(buildConfig());
        window.blok = blok;
      }, 50);
    }

    /**
     * Page routing
     */
    const tabs = document.querySelectorAll('[role="tab"]');

    const VALID_PAGES = ['editor', 'block-states', 'icons'];

    function parseRoute(pathname) {
      const segments = pathname.replace(/^\/+|\/+$/g, '').split('/').filter(Boolean);
      const page = VALID_PAGES.includes(segments[0]) ? segments[0] : 'editor';
      const subpath = segments.slice(1).join('/');
      return { page, subpath };
    }

    let blockStatesInitialized = false;
    let blockStatesHandle = null;

    function navigateTo(page, subpath) {
      tabs.forEach(t => t.setAttribute('aria-selected', t.dataset.tab === page ? 'true' : 'false'));
      document.getElementById('tab-editor').classList.toggle('hidden', page !== 'editor');
      document.getElementById('tab-block-states').classList.toggle('hidden', page !== 'block-states');
      document.getElementById('tab-icons').classList.toggle('hidden', page !== 'icons');

      if (page === 'block-states') {
        if (!blockStatesInitialized) {
          blockStatesInitialized = true;
          queueMicrotask(() => initBlockStatesGallery(subpath || null));
        } else if (subpath && blockStatesHandle) {
          blockStatesHandle.setActiveTool(subpath);
        }
      }
    }

    tabs.forEach(tab => {
      tab.addEventListener('click', (e) => {
        e.preventDefault();
        const page = tab.dataset.tab;
        history.pushState(null, '', `/${page}`);
        navigateTo(page, '');
      });
    });

    window.addEventListener('popstate', () => {
      const { page, subpath } = parseRoute(window.location.pathname);
      navigateTo(page, subpath);
    });

    // Initial route
    const initialRoute = parseRoute(window.location.pathname);
    const rawSlug = window.location.pathname.replace(/^\//, '').split('/')[0];
    if (!VALID_PAGES.includes(rawSlug)) {
      history.replaceState(null, '', '/editor');
    }
    navigateTo(initialRoute.page, initialRoute.subpath);

    /**
     * Hide playground header + settings side-tab on scroll down, show on scroll up.
     */
    (() => {
      const header = document.querySelector('.playground-header');
      const sideTab = document.getElementById('settings-tab');
      if (!header) return;
      const HIDE_THRESHOLD = 80;
      let lastY = window.scrollY;
      let ticking = false;
      const setHidden = (hidden) => {
        header.classList.toggle('is-hidden', hidden);
        if (sideTab) sideTab.classList.toggle('is-hidden', hidden);
        document.body.classList.toggle('header-hidden', hidden);
      };
      const update = () => {
        const y = window.scrollY;
        if (y <= HIDE_THRESHOLD) {
          setHidden(false);
        } else if (y > lastY) {
          setHidden(true);
        } else if (y < lastY) {
          setHidden(false);
        }
        lastY = y;
        ticking = false;
      };
      window.addEventListener('scroll', () => {
        if (!ticking) {
          ticking = true;
          window.requestAnimationFrame(update);
        }
      }, { passive: true });
    })();

    /**
     * Settings panel open/close
     */
    const settingsTab = document.getElementById('settings-tab');
    const settingsPanel = document.getElementById('settings-panel');
    const settingsClose = document.getElementById('settings-close');
    const mainContent = document.getElementById('main-content');

    function openSettingsPanel() {
      settingsPanel.style.transform = '';
      settingsPanel.classList.remove('translate-x-full');
      settingsTab.classList.add('hidden');
      mainContent.style.marginRight = '300px';
    }

    function closeSettingsPanel() {
      settingsPanel.classList.add('translate-x-full');
      settingsTab.classList.remove('hidden');
      settingsTab.classList.remove('is-hidden');
      mainContent.style.marginRight = '0';
    }

    function toggleSettingsPanel() {
      if (settingsPanel.classList.contains('translate-x-full')) {
        openSettingsPanel();
      } else {
        closeSettingsPanel();
      }
    }

    settingsTab.addEventListener('click', openSettingsPanel);
    settingsClose.addEventListener('click', closeSettingsPanel);

    document.addEventListener('keydown', (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === '\\') {
        e.preventDefault();
        toggleSettingsPanel();
        return;
      }
      if (e.key === 'Escape' && !settingsPanel.classList.contains('translate-x-full')) {
        e.preventDefault();
        closeSettingsPanel();
        return;
      }
      if (!e.altKey || e.metaKey || e.ctrlKey || e.shiftKey) return;

      const settingsShortcuts = {
        KeyR: () => document.getElementById('toggle-readonly').click(),
        KeyD: () => document.getElementById('toggle-dark').click(),
        KeyF: () => document.getElementById('toggle-autofocus').click(),
        KeyN: () => {
          const sel = document.getElementById('select-notifier-position');
          const next = (sel.selectedIndex + 1) % sel.options.length;
          sel.selectedIndex = next;
          sel.dispatchEvent(new Event('change'));
        },
        KeyX: () => document.getElementById('reset-content').click(),
      };

      const toolMatch = e.code.match(/^Digit([1-9])$/);
      if (toolMatch) {
        const tool = TOOL_DEFS[Number(toolMatch[1]) - 1];
        if (tool) {
          e.preventDefault();
          document.getElementById(`toggle-tool-${tool.key}`).click();
        }
        return;
      }

      const action = settingsShortcuts[e.code];
      if (action) {
        e.preventDefault();
        action();
      }
    });

    /**
     * Mode toggles
     */
    const toggleReadonly = document.getElementById('toggle-readonly');
    const toggleDark = document.getElementById('toggle-dark');
    const toggleAutofocus = document.getElementById('toggle-autofocus');

    /**
     * Applies or removes dark mode on the page and Blok theme.
     * Single source of truth used by the manual toggle and the system
     * preference change listener.
     */
    function applyDarkMode(enabled) {
      state.darkMode = enabled;
      toggleDark.checked = enabled;
      document.body.classList.toggle('dark-mode', enabled);
      if (enabled) {
        document.documentElement.setAttribute('data-blok-theme', 'dark');
      } else {
        const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (systemPrefersDark) {
          // System is dark but user explicitly wants light — use "light" override
          // so the @media dark rule's :not([data-blok-theme="light"]) guard fires
          document.documentElement.setAttribute('data-blok-theme', 'light');
        } else {
          document.documentElement.removeAttribute('data-blok-theme');
        }
      }

    });

      await blok.readOnly.toggle(state.readOnly);
