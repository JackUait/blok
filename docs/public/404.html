<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Blok — Block-Based Rich Text Editor</title>
    <script>
      // SPA redirect for GitHub Pages
      // Encodes the path into a query parameter so GitHub Pages
      // redirects to index.html, which then restores the URL.
      // Based on https://github.com/rafgraph/spa-github-pages
      var segmentCount = 0;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
