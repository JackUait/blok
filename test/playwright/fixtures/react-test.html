<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blok React Adapter E2E Test</title>
  <script type="importmap">
  {
    "imports": {
      "react": "/test/playwright/fixtures/vendor/react.mjs",
      "@bloklabs/core": "/dist/blok.mjs?_v=1",
      "@bloklabs/core/adapters": "/dist/adapters.mjs?_v=1",
      "react-dom": "/test/playwright/fixtures/vendor/react-dom.mjs",
      "react-dom/client": "/test/playwright/fixtures/vendor/react-dom-client.mjs",
      "react/jsx-runtime": "/test/playwright/fixtures/vendor/react-jsx-runtime.mjs"
    }
  }
  </script>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    #editor-container { border: 1px solid #ccc; min-height: 200px; padding: 10px; margin: 10px 0; }
    button { margin-right: 8px; padding: 4px 12px; }
    #output { white-space: pre-wrap; background: #f5f5f5; padding: 10px; margin-top: 10px; font-family: monospace; font-size: 12px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="module">
    import React, { useState, useCallback } from 'react';
    import { createRoot } from 'react-dom/client';
    import { jsx, jsxs } from 'react/jsx-runtime';
    import { useBlok, useBlocks, BlokContent } from '/packages/react/dist/index.mjs?_v=1';

    // Import tools from the built dist
    const { Paragraph, Header } = await import('/dist/tools.mjs?_v=1');

    function App() {
      const [readOnly, setReadOnly] = useState(false);
      const [output, setOutput] = useState('');
      const [status, setStatus] = useState('loading');

      const editor = useBlok({
        tools: {
          paragraph: { class: Paragraph },
          header: { class: Header },
        },
        data: {
          blocks: [
            { id: 'block1', type: 'paragraph', data: { text: 'Hello from React' } },
          ],
        },
        readOnly,
        onReady: () => {
          setStatus('ready');
        },
      });

      // Expose the real useBlocks API (bound to the real built editor) on window
      // so E2E can drive insertTree / insertMarkdown / insert against the genuine
      // editor.blocks pipeline — no fakes. Re-exposed on every change so reads
      // reflect the latest snapshot.
      const blocks = useBlocks(editor);

      React.useEffect(() => {
        window.__blocksApi = blocks;
      }, [blocks]);

      // Reactive read: the number of ROOT blocks, derived in render from the live
      // snapshot. It refreshes ONLY when useBlocks re-renders the component on a
      // 'block changed' emission — so an e2e can assert this updates after a bulk
      // insertTree/insertMarkdown WITHOUT any other interaction, proving the
      // reactivity contract end-to-end against the real bundle.
      const rootCount = blocks.getChildren(null).length;

      // Update status when editor becomes available
      React.useEffect(() => {
        if (editor !== null) {
          setStatus('ready');
        }
      }, [editor]);

      const handleSave = useCallback(async () => {
        if (editor === null) return;
        const data = await editor.save();
        setOutput(JSON.stringify(data, null, 2));
      }, [editor]);

      const toggleReadOnly = useCallback(() => {
        setReadOnly(prev => !prev);
      }, []);

      return jsxs('div', {
        children: [
          jsx('div', { 'data-blok-testid': 'status', children: status }),
          jsx('div', { 'data-blok-testid': 'root-count', children: String(rootCount) }),
          jsx('button', { 'data-blok-testid': 'save', onClick: handleSave, children: 'Save' }),
          jsx('button', { 'data-blok-testid': 'toggle-readonly', onClick: toggleReadOnly, children: readOnly ? 'Enable Editing' : 'Toggle Read Only' }),
          jsx(BlokContent, { editor, 'data-blok-testid': 'editor-container', id: 'editor-container' }),
          jsx('pre', { 'data-blok-testid': 'output', id: 'output', children: output }),
        ],
      });
    }

    const root = createRoot(document.getElementById('root'));
    root.render(jsx(App, {}));
  </script>
</body>
</html>
