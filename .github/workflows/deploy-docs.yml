name: Deploy Docs

on:
  push:
    branches: ["**"]
    paths:
      - "docs/**"
      - "CHANGELOG.md"
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  docs-tests:
    name: Docs Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js and Dependencies
        uses: ./.github/actions/setup-node-deps

      - name: Run docs tests
        run: cd docs && npm test

  # Checks that the npm package family matching the release tag is published, so
  # the docs never advertise a version nobody can install. That question is
  # meaningless for a docs-only deploy, hence the release-only gate.
  verify-release:
    name: Verify Package Family Release
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    timeout-minutes: 2
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Verify published package family
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: node scripts/verify-docs-release.mjs "$RELEASE_TAG"

  build:
    name: Build Docs
    runs-on: ubuntu-latest
    needs: [docs-tests, verify-release]
    timeout-minutes: 15
    # Deploy on releases, manual runs, and docs pushes to master. A skipped
    # `needs` job skips its dependents by default, so a docs-only deploy (where
    # verify-release never runs) has to accept 'skipped' explicitly.
    if: >-
      ${{ !cancelled()
      && needs.docs-tests.result == 'success'
      && (needs.verify-release.result == 'success' || needs.verify-release.result == 'skipped')
      && (github.event_name != 'push' || github.ref == 'refs/heads/master') }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      - name: Setup Node.js and Dependencies
        uses: ./.github/actions/setup-node-deps

      - name: Build Blok library
        run: yarn build

      - name: Build docs
        run: cd docs && yarn build

      # The library is NOT copied into the artifact: the demo's `/dist/react.mjs`
      # and `/dist/tools.mjs` imports are resolved and bundled at build time by
      # docs/vite.config.ts's external-dist plugin, so the deployed site never
      # requests /dist from its own origin — the copy was 47 MB of dead weight.
      - name: Copy CHANGELOG into docs output
        run: cp CHANGELOG.md docs/dist/CHANGELOG.md

      # A prerender regression is invisible from a green build: the files are
      # still emitted, they are just empty shells again, and every crawler that
      # does not run JavaScript sees a blank page. Probe one real page for
      # rendered markup, and check the two files that make the site crawlable
      # at all — before anything is published, not after.
      - name: Verify deploy artifact
        run: |
          set -euo pipefail
          page=docs/dist/client/docs/quick-start/index.html
          test -f "$page"
          grep -q '<h1' "$page"
          grep -q 'Blok' "$page"
          test -s docs/dist/client/robots.txt
          test -s docs/dist/client/sitemap.xml

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # React Router's framework build splits its output into dist/client (the
      # prerendered HTML + assets) and dist/server; only the client half is the
      # site, so the artifact root moved one level down.
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/dist/client/

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    # A skip propagates through the whole `needs` chain, not just one link:
    # `verify-release` is skipped on a docs push, `build` overrides that for
    # itself and goes green — and `deploy` is skipped anyway. Every docs deploy
    # between ungating the build and this line built the site, verified the
    # artifact, and published nothing.
    if: ${{ !cancelled() && needs.build.result == 'success' }}
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
