<!DOCTYPE html>
<html lang="en">
  <head>
    <script>
      // SPA routing restore for GitHub Pages
      // Decodes the URL encoded by 404.html and restores it via history.replaceState
      // Based on https://github.com/rafgraph/spa-github-pages
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&');
          });
          window.history.replaceState(
            null, null,
            l.pathname.slice(0, -1) + decoded[0] +
            (decoded[1] ? '?' + decoded[1] : '') +
            l.hash
          );
        }
      }(window.location));
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blok — Block-Based Rich Text Editor</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48x48.png">
    <link rel="icon" type="image/png" sizes="64x64" href="/favicon-64x64.png">
    <link rel="icon" type="image/png" sizes="128x128" href="/favicon-128x128.png">
    <link rel="icon" type="image/png" sizes="256x256" href="/favicon-256x256.png">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="apple-touch-icon" sizes="192x192" href="/android-chrome-192x192.png">
    <link rel="manifest" href="/site.webmanifest">
    <script>
      // Keep local development out of the production property. This is gtag's
      // official opt-out flag, so it must be set BEFORE the loader below runs;
      // the tag still loads, it just stops sending. To check analytics locally,
      // set window['ga-disable-G-P4F8SK0C03'] = false in the console.
      if (['localhost', '127.0.0.1', '[::1]'].includes(location.hostname)) {
        window['ga-disable-G-P4F8SK0C03'] = true;
      }
    </script>
    <!-- Google tag (gtag.js).
         No integrity hash on purpose: gtag.js is a mutable endpoint Google
         redeploys continuously, so any pinned SHA would break analytics for
         every visitor on their next release. -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-P4F8SK0C03"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      // send_page_view: false — this is a single-page app, so the router sends
      // page views itself (src/hooks/usePageTracking.ts). Leaving the automatic
      // one on would record only the entry URL and double-count it.
      gtag('config', 'G-P4F8SK0C03', { send_page_view: false });
    </script>
    <script>
      // Immediately apply theme before page renders to prevent flash
      (function() {
        const STORAGE_KEY = 'blok-docs-theme';
        const VALID_THEMES = ['light', 'dark', 'system'];

        const stored = localStorage.getItem(STORAGE_KEY);
        const theme = stored && VALID_THEMES.includes(stored) ? stored : 'system';

        let resolvedTheme = theme;
        if (theme === 'system') {
          const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          resolvedTheme = systemPrefersDark ? 'dark' : 'light';
        }

        document.documentElement.setAttribute('data-theme', resolvedTheme);
        document.documentElement.classList.add(resolvedTheme);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
